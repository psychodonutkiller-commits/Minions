<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion Defense: Dark Protocol</title>
    <style>
        body { margin: 0; padding: 0; background: #050510; overflow: hidden; font-family: 'Courier New', monospace; color: white; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; background: radial-gradient(circle, #1a1a2e, #000); }
        .ui { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; pointer-events: none; z-index: 2; }
        .ui-left { text-align: left; }
        .ui-right { text-align: right; }
        #score-board { font-size: 24px; color: #ffd700; font-weight: bold; }
        #level-display { font-size: 18px; color: #00ff00; margin-top: 5px; }
        #weapon-display { font-size: 14px; color: #00ffff; }
        #health-bar { width: 150px; height: 15px; background: #111; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        #health-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ffaa00); }
        #gun-selector { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 5; }
        .gun-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.8); border: 2px solid #555; border-radius: 8px; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .gun-btn.active { border-color: #ffd700; background: rgba(255,215,0,0.3); }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        h1 { font-size: 32px; color: #ffd700; margin: 0 0 20px 0; text-shadow: 0 0 15px #ffaa00; }
        h2 { color: #00ffff; margin: 0 0 15px 0; }
        p { color: #aaa; margin: 0 0 20px 0; text-align: center; max-width: 80%; }
        input { padding: 12px; font-size: 18px; background: #111; border: 2px solid #ffd700; color: #fff; border-radius: 5px; text-align: center; width: 200px; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 16px; background: #ffd700; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #fff; }
        .lb { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; max-height: 250px; overflow-y: auto; width: 70%; max-width: 300px; }
        .lb-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; }
        .lb-head { color: #ffd700; font-weight: bold; border-bottom: 2px solid #ffd700; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui">
        <div class="ui-left">
            <div id="score-board">SCORE: 0</div>
            <div id="level-display">LEVEL: 1</div>
            <div id="weapon-display">BANANA BLASTER</div>
        </div>
        <div class="ui-right">
            <div id="health-bar"><div id="health-fill"></div></div>
        </div>
    </div>
    
    <div id="gun-selector">
        <div class="gun-btn active" onclick="changeGun(0)">1</div>
        <div class="gun-btn" onclick="changeGun(1)">2</div>
        <div class="gun-btn" onclick="changeGun(2)">3</div>
        <div class="gun-btn" onclick="changeGun(3)">4</div>
    </div>

    <div id="start-screen" class="screen">
        <h1>MINION DEFENSE</h1>
        <p>Dark Protocol Engaged.<br>Defend the lab!</p>
        <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
        <div>
            <button onclick="showLB()">SCORES</button>
            <button onclick="startGame()">START</button>
        </div>
    </div>

    <div id="lb-screen" class="screen hidden">
        <h1>TOP AGENTS</h1>
        <div class="lb" id="lb-list"></div>
        <button onclick="showStart()">BACK</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1 style="color:#ff0000;">SYSTEM FAILURE</h1>
        <h2 id="final-score">Score: 0</h2>
        <p id="final-level">Level: 1</p>
        <button onclick="startGame()">RETRY</button>
    </div>

    <div id="victory-screen" class="screen hidden">
        <h1 style="color:#00ff00;">MISSION COMPLETE!</h1>
        <h2 id="victory-score">Score: 0</h2>
        <button onclick="startGame()">PLAY AGAIN</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-board');
const levelEl = document.getElementById('level-display');
const weaponEl = document.getElementById('weapon-display');
const healthFill = document.getElementById('health-fill');
const startScreen = document.getElementById('start-screen');
const lbScreen = document.getElementById('lb-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const victoryScreen = document.getElementById('victory-screen');
const lbList = document.getElementById('lb-list');
const nameInput = document.getElementById('player-name');

let gameRunning = false, score = 0, level = 1, frame = 0, timer = 0;
let player, bullets = [], enemies = [], effects = [];
let gunIndex = 0, pName = "AGENT";
const MAX_LEVEL = 25;
const LEVEL_TIME = 1200;

const guns = [
    {name:"BANANA BLASTER",color:"#FFD700",size:6,speed:18,rate:8,type:"single"},
    {name:"RAPID FIRE",color:"#00ff00",size:4,speed:22,rate:3,type:"single"},
    {name:"SPREAD SHOT",color:"#ff00ff",size:5,speed:14,rate:15,type:"spread"},
    {name:"PLASMA LASER",color:"#00ffff",size:12,speed:25,rate:25,type:"large"}
];

function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = init; init();

let mx = canvas.width/2, my = canvas.height-80, firing = false;
canvas.onmousemove = e => { mx = e.clientX; my = e.clientY; };
canvas.ontouchmove = e => { e.preventDefault(); mx = e.touches[0].clientX; my = e.touches[0].clientY; };
canvas.onmousedown = () => firing = true;
canvas.onmouseup = () => firing = false;
canvas.ontouchstart = e => { firing = true; mx = e.touches[0].clientX; my = e.touches[0].clientY; };
canvas.ontouchend = () => firing = false;
document.onkeydown = e => { if(gameRunning && e.key>='1' && e.key<='4') changeGun(parseInt(e.key)-1); };

function changeGun(i) { gunIndex = i; weaponEl.innerText = guns[i].name; document.querySelectorAll('.gun-btn').forEach((b,n)=>b.classList.toggle('active',n===i)); }

function getLB() { return JSON.parse(localStorage.getItem('minionLB')||'[]'); }
function saveScore() { let lb = getLB(); lb.push({name:pName,score:score,level:level}); lb.sort((a,b)=>b.score-a.score); localStorage.setItem('minionLB',JSON.stringify(lb.slice(0,10))); }
function showLB() { let lb = getLB(); lbList.innerHTML = '<div class="lb-row lb-head"><span>NAME</span><span>SCORE</span></div>'; lb.forEach((e,n)=>lbList.innerHTML+=`<div class="lb-row"><span>${n+1}. ${e.name}</span><span>${e.score}</span></div>`); startScreen.classList.add('hidden'); lbScreen.classList.remove('hidden'); }
function showStart() { lbScreen.classList.add('hidden'); startScreen.classList.remove('hidden'); }

class Player {
    constructor() { this.x = canvas.width/2; this.y = canvas.height-80; this.r = 25; this.hp = 100; }
    draw() {
        ctx.fillStyle = '#0074D9'; ctx.fillRect(this.x-22,this.y+5,44,35); ctx.fillRect(this.x-18,this.y+35,10,15); ctx.fillRect(this.x+8,this.y+35,10,15);
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle = '#FFD700'; ctx.fill();
        ctx.fillStyle = '#333'; ctx.fillRect(this.x-28,this.y-5,56,10);
        ctx.beginPath(); ctx.arc(this.x,this.y,14,0,Math.PI*2); ctx.fillStyle = '#Silver'; ctx.fill();
        ctx.beginPath(); ctx.arc(this.x,this.y,7,0,Math.PI*2); ctx.fillStyle = '#00ffff'; ctx.fill();
        ctx.fillStyle = guns[gunIndex].color; ctx.fillRect(this.x+15,this.y+8,20,8);
    }
    update() {
        this.x += (mx-this.x)*0.15; this.y += (my-this.y)*0.15;
        this.x = Math.max(25,Math.min(canvas.width-25,this.x));
        this.y = Math.max(canvas.height/2,Math.min(canvas.height-40,this.y));
        if(firing && frame%guns[gunIndex].rate===0) shoot();
    }
    shoot() {
        const g = guns[gunIndex];
        if(g.type==='single') bullets.push(new Bullet(this.x,this.y-20,g));
        else if(g.type==='spread'){ bullets.push(new Bullet(this.x,this.y-20,g,-4)); bullets.push(new Bullet(this.x,this.y-20,g,0)); bullets.push(new Bullet(this.x,this.y-20,g,4)); }
        else bullets.push(new Bullet(this.x,this.y-25,g));
    }
}

class Bullet {
    constructor(x,y,g,vx) { this.x=x; this.y=y; this.r=g.size; this.c=g.color; this.vx=vx; this.vy=-g.speed; }
    draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=this.c; ctx.shadowBlur=12; ctx.shadowColor=this.c; ctx.fill(); ctx.shadowBlur=0; }
    update() { this.x+=this.vx; this.y+=this.vy; }
}

class Enemy {
    constructor() { this.x=Math.random()*(canvas.width-60)+30; this.y=-40; this.r=25; this.c='#9b30ff'; this.vy = 2+Math.random()*2+(level*0.15)+(score*0.0001); if(this.vy>10)this.vy=10; }
    draw() { ctx.fillStyle=this.c; ctx.fillRect(this.x-18,this.y-18,36,36); ctx.fillStyle='#00ff00'; ctx.fillRect(this.x-8,this.y-8,16,6); }
    update() { this.y+=this.vy; }
}

class Effect {
    constructor(x,y,c) { this.x=x; this.y=y; this.c=c; this.vx=(Math.random()-0.5)*6; this.vy=(Math.random()-0.5)*6; this.life=1; this.r=Math.random()*3+1; }
    draw() { ctx.globalAlpha=this.life; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=this.c; ctx.fill(); ctx.globalAlpha=1; }
    update() { this.x+=this.vx; this.y+=this.vy; this.life-=0.03; }
}

function spawn() { let rate = Math.max(25, 60-level); if(frame%rate===0) enemies.push(new Enemy()); }
function boom(x,y,c) { for(let i=0;i<12;i++) effects.push(new Effect(x,y,c)); }
function check() {
    bullets.forEach((b,bi) => { enemies.forEach((e,ei) => { if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+b.r){ boom(e.x,e.y,e.c); score+=100; scoreEl.innerText="SCORE: "+score; bullets.splice(bi,1); enemies.splice(ei,1); }}); });
    enemies.forEach((e,ei) => { if(Math.hypot(player.x-e.x,player.y-e.y)<player.r+e.r){ boom(player.x,player.y,'#f00'); player.hp-=20; healthFill.style.width=player.hp+"%"; enemies.splice(ei,1); if(player.hp<=0)end(); }});
}

function loop() {
    if(!gameRunning) return;
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    // Grid background
    ctx.strokeStyle = '#00ffcc08';
    for(let i=0;i<canvas.width;i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
    for(let i=0;i<canvas.height;i+=50) { let y = (i + frame)%50; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
    
    player.draw(); player.update();
    bullets.forEach((b,i)=>{b.update();b.draw();if(b.y<0)bullets.splice(i,1);});
    enemies.forEach((e,i)=>{e.update();e.draw();if(e.y>canvas.height+50)enemies.splice(i,1);});
    effects.forEach((e,i)=>{e.update();e.draw();if(e.life<=0)effects.splice(i,1);});
    
    spawn(); check(); frame++; timer++;
    if(timer>LEVEL_TIME){ timer=0; level++; if(level>MAX_LEVEL){ win(); }else{ levelEl.innerText="LEVEL: "+level; }}
}

function start() {
    pName = nameInput.value.trim() || "AGENT";
    player = new Player(); bullets=[]; enemies=[]; effects=[]; score=0; level=1; frame=0; timer=0;
    scoreEl.innerText="SCORE: 0"; levelEl.innerText="LEVEL: 1"; healthFill.style.width="100%";
    gameRunning = true;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    victoryScreen.classList.add('hidden');
    loop();
}

function end() { gameRunning=false; saveScore(); document.getElementById('final-score').innerText="Score: "+score; document.getElementById('final-level').innerText="Level: "+level; gameOverScreen.classList.remove('hidden'); }
function win() { gameRunning=false; saveScore(); document.getElementById('victory-score').innerText="Score: "+score; victoryScreen.classList.remove('hidden'); }
</script>
</body>
</html>
