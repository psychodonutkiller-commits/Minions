const canvas = document.getElementById('gameCanvas');

    {name:"PLASMA LASER", color:"#00ffff", size:12, speed:25, cooldown:25, type:"large"}
];

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize',resize); resize();

let mouseX=canvas.width/2, mouseY=canvas.height-100, isTouching=false;
function updateInput(x,y){ mouseX=x; mouseY=y; }

canvas.addEventListener('mousemove',e=>{if(gameActive)updateInput(e.clientX,e.clientY);});

window.addEventListener('keydown',e=>{if(gameActive && e.key>='1' && e.key<='4')changeGun(parseInt(e.key)-1);});

function changeGun(idx){currentGun=idx; weaponEl.innerText="WEAPON: "+guns[idx].name; document.querySelectorAll('.gun-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));}

function getLB(){return JSON.parse(localStorage.getItem('minionLB')||'[]');}
function saveScore(){let lb=getLB(); lb.push({name:playerName,score:score,lvl:currentLevel,date:new Date().toLocaleDateString()}); lb.sort((a,b)=>b.score-a.score); localStorage.setItem('minionLB',JSON.stringify(lb.slice(0,10)));}
function showLeaderboard(){let lb=getLB(); lbList.innerHTML='<div class="lb-row header"><span>RANK</span><span>SCORE</span></div>'; if(lb.length===0)lbList.innerHTML+='<div style="text-align:center;padding:20px;color:#666;">No scores yet!</div>'; lb.forEach((e,i)=>lbList.innerHTML+=`<div class="lb-row"><span>${i+1}. ${e.name}</span><span>${e.score}</span></div>`); startScreen.classList.add('hidden'); lbScreen.classList.remove('hidden');}

class Player{constructor(){this.x=canvas.width/2; this.y=canvas.height-80; this.radius=25; this.health=100;}draw(){
ctx.fillStyle='#0074D9'; ctx.fillRect(this.x-22,this.y+5,44,35); ctx.fillRect(this.x-18,this.y+35,10,15); ctx.fillRect(this.x+8,this.y+35,10,15);
ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fillStyle='#FFD700'; ctx.fill();
ctx.fillStyle='#333'; ctx.fillRect(this.x-28,this.y-5,56,10);

ctx.beginPath(); ctx.arc(this.x,this.y,7,0,Math.PI*2); ctx.fillStyle='#00ffff'; ctx.fill();
ctx.fillStyle=guns[currentGun].color; ctx.fillRect(this.x+15,this.y+8,20,8);

this.x+=(mouseX-this.x)*0.15; this.y+=(mouseY-this.y)*0.15;
if(this.x<25)this.x=25; if(this.x>canvas.width-25)this.x=canvas.width-25;

class Projectile{constructor(x,y,g,ax=0){this.x=x;this.y=y;this.r=g.size;this.col=g.color;this.vx=ax;this.vy=-g.speed;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.col;ctx.shadowBlur=15;ctx.shadowColor=this.col;ctx.fill();ctx.shadowBlur=0;}update(){this.x+=this.vx;this.y+=this.vy;}}

                                                                                                                                                                                                                                                                                                                                                              player.health-=20;healthFill.style.width=player.health+"%";enemies.splice(ei,1);if(player.health<=0)endGame();}});}

function animate(){if(!gameActive)return;requestAnimationFrame(animate);ctx.clearRect(0,0,canvas.width,canvas.height);

enemies.forEach((e,i)=>{e.update();e.draw();if(e.y-e.r>canvas.height)enemies.splice(i,1);});spawnEnemies();checkCollisions();checkLevel();frameCount++;}
