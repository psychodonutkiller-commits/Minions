<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minion Defense: Dark Protocol</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            box-shadow: 0 0 20px #00ffcc33;
            display: block;
        }

        .ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 2;
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #ffff00;
            color: #ffd700;
        }

        #health-bar-container {
            width: 200px;
            height: 20px;
            border: 2px solid #333;
            background: #111;
            margin-bottom: 20px;
            align-self: center;
            border-radius: 10px;
            overflow: hidden;
        }

        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ffaa00);
            transition: width 0.2s;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
        }

        h1 {
            font-size: 40px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffaa00;
            margin-bottom: 10px;
            text-align: center;
            font-style: italic;
        }

        p {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            background: #ffd700;
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #ffd700;
            border-radius: 5px;
            text-transform: uppercase;
        }
        
        button:hover {
            background: #fff;
            box-shadow: 0 0 25px #fff;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="score-board">SCORE: 0</div>
        <div id="health-bar-container">
            <div id="health-fill"></div>
        </div>
    </div>

    <div id="start-screen">
        <h1>MINION DEFENSE</h1>
        <p>Dark Protocol Engaged.<br>Defend the lab from Vector Bots!</p>
        <p style="font-size:14px; color:#666;">PC: Mouse to Aim/Click to Shoot<br>Mobile: Touch to Aim/Shoot</p>
        <button onclick="startGame()">START MISSION</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1>SYSTEM FAILURE</h1>
        <p>The Villains have taken over.</p>
        <h2 id="final-score" style="color:white; margin-bottom: 20px;">Score: 0</h2>
        <button onclick="startGame()">REBOOT SYSTEM</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const scoreEl = document.getElementById('score-board');
    const healthFill = document.getElementById('health-fill');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');

    let gameActive = false;
    let score = 0;
    let frameCount = 0;
    let player;
    let projectiles = [];
    let enemies = [];
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // INPUT
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height - 100;
    let isTouching = false;

    function updateInput(x, y) {
        mouseX = x;
        mouseY = y;
    }

    canvas.addEventListener('mousemove', (e) => {
        if(!gameActive) return;
        updateInput(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchmove', (e) => {
        if(!gameActive) return;
        e.preventDefault();
        updateInput(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});

    canvas.addEventListener('mousedown', () => isTouching = true);
    canvas.addEventListener('mouseup', () => isTouching = false);
    canvas.addEventListener('touchstart', (e) => {
        isTouching = true;
        updateInput(e.touches[0].clientX, e.touches[0].clientY);
    });
    canvas.addEventListener('touchend', () => isTouching = false);

    // CLASSES

    class Player {
        constructor() {
            this.radius = 25;
            this.color = '#FFD700';
            this.x = canvas.width / 2;
            this.y = canvas.height - 80;
            this.health = 100;
        }

        draw() {
            // Overalls (Blue)
            ctx.fillStyle = '#0074D9';
            ctx.fillRect(this.x - 22, this.y + 5, 44, 35);

            // Legs
            ctx.fillRect(this.x - 18, this.y + 35, 10, 15);
            ctx.fillRect(this.x + 8, this.y + 35, 10, 15);

            // Head (Yellow)
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();

            // Goggle Strap
            ctx.fillStyle = '#333';
            ctx.fillRect(this.x - 28, this.y - 5, 56, 10);

            // Goggle Eye (Silver/Cyan)
            ctx.beginPath();
            ctx.arc(this.x, this.y, 14, 0, Math.PI * 2);
            ctx.fillStyle = '#Silver';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x, this.y, 7, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffff';
            ctx.fill();

            // Mouth (Grim line)
            ctx.beginPath();
            ctx.moveTo(this.x - 8, this.y + 18);
            ctx.lineTo(this.x + 8, this.y + 18);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        update() {
            // Smooth follow
            let dx = mouseX - this.x;
            let dy = mouseY - this.y;
            this.x += dx * 0.15;
            this.y += dy * 0.15;

            // Bounds
            if (this.x < this.radius) this.x = this.radius;
            if (this.x > canvas.width - this.radius) this.x = canvas.width - this.radius;
            if (this.y < canvas.height/2) this.y = canvas.height/2;
            if (this.y > canvas.height - 40) this.y = canvas.height - 40;

            // Shoot
            if(isTouching && frameCount % 8 === 0) {
                projectiles.push(new Projectile(this.x, this.y - 20));
            }
        }
    }

    class Projectile {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 6;
            this.color = '#FFD700';
            this.velocity = {x: 0, y: -18};
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        update() {
            this.y += this.velocity.y;
        }
    }

    class Enemy {
        constructor() {
            this.radius = 25;
            this.x = Math.random() * (canvas.width - 60) + 30;
            this.y = -40;
            this.color = '#9b30ff'; // Vector Purple
            this.speed = Math.random() * 2 + 2 + (score * 0.005); 
            if(this.speed > 10) this.speed = 10; // Max speed
        }

        draw() {
            // Body
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - 18, this.y - 18, 36, 36);
            
            // Eye
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(this.x - 8, this.y - 8, 16, 6);
            
            // Eye line
            ctx.strokeStyle = '#003300';
            ctx.beginPath();
            ctx.moveTo(this.x, this.y-5);
            ctx.lineTo(this.x+30, this.y-15);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(this.x, this.y-5);
            ctx.lineTo(this.x-30, this.y-15);
            ctx.stroke();
        }

        update() {
            this.y += this.speed;
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.velocity = {
                x: (Math.random() - 0.5) * 8,
                y: (Math.random() - 0.5) * 8
            };
            this.alpha = 1;
            this.radius = Math.random() * 3 + 1;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha -= 0.02;
        }
    }

    // GAME LOGIC

    function init() {
        player = new Player();
        projectiles = [];
        enemies = [];
        particles = [];
        score = 0;
        frameCount = 0;
        scoreEl.innerText = "SCORE: " + score;
        healthFill.style.width = "100%";
    }

    function spawnEnemies() {
        if (frameCount % 60 === 0) { // Spawn rate
            enemies.push(new Enemy());
        }
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function checkCollisions() {
        // Projectiles hitting Enemies
        projectiles.forEach((projectile, pIndex) => {
            enemies.forEach((enemy, eIndex) => {
                const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
                
                if (dist - enemy.radius - projectile.radius < 1) {
                    createExplosion(enemy.x, enemy.y, enemy.color);
                    score += 100;
                    scoreEl.innerText = "SCORE: " + score;
                    
                    setTimeout(() => {
                        enemies.splice(eIndex, 1);
                        projectiles.splice(pIndex, 1);
                    }, 0);
                }
            });
        });

        // Enemies hitting Player
        enemies.forEach((enemy, index) => {
            const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
            
            if (dist - enemy.radius - player.radius < 1) {
                createExplosion(player.x, player.y, '#ff0000');
                player.health -= 20;
                healthFill.style.width = player.health + "%";
                enemies.splice(index, 1);

                if (player.health <= 0) {
                    endGame();
                }
            }
        });
    }

    function animate() {
        if (!gameActive) return;
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Background Grid (Sci-fi look)
        ctx.strokeStyle = '#00ffcc11';
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=50) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
        }
        // Horizontal moving grid
        let offset = (frameCount * 2) % 50;
        for(let i=0; i<canvas.height; i+=50) {
            ctx.beginPath(); ctx.moveTo(0, i + offset); ctx.lineTo(canvas.width, i + offset); ctx.stroke();
        }

        player.draw();
        player.update();

        particles.forEach((particle, index) => {
            if(particle.alpha <= 0) {
                particles.splice(index, 1);
            } else {
                particle.update();
                particle.draw();
            }
        });

        projectiles.forEach((projectile, index) => {
            projectile.update();
            projectile.draw();
            if (projectile.y + projectile.radius < 0) {
                projectiles.splice(index, 1);
            }
        });

        enemies.forEach((enemy, index) => {
            enemy.update();
            enemy.draw();
            if (enemy.y - enemy.radius > canvas.height) {
                enemies.splice(index, 1);
                // Penalty for letting enemies pass? Optional
            }
        });

        spawnEnemies();
        checkCollisions();
        frameCount++;
    }

    function startGame() {
        init();
        gameActive = true;
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        animate();
    }

    function endGame() {
        gameActive = false;
        finalScoreEl.innerText = "Score: " + score;
        gameOverScreen.classList.remove('hidden');
    }

</script>
</body>
</html>
